  <style>
    :root {
      --bg: #fafafa;
      --bg-subtle: #f0f0f0;
      --bg-hover: #eee;
      --bg-active: #d4e8ff;
      --text: #222;
      --text-muted: #888;
      --text-faint: #aaa;
      --border: #ccc;
      --border-subtle: #ddd;
      --input-bg: #fff;
      --btn-bg: #fff;
      --btn-hover: #e8e8e8;
      --popup-bg: #fff;
      --popup-text: #222;
      --control-bg: #fff;
      --control-text: #333;
    }
    html.dim {
      --bg: #2d2e36;
      --bg-subtle: #363740;
      --bg-hover: #42434d;
      --bg-active: #3d4f6f;
      --text: #e2e2e8;
      --text-muted: #a8a8b3;
      --text-faint: #7a7a85;
      --border: #4a4b55;
      --border-subtle: #40414b;
      --input-bg: #383942;
      --btn-bg: #383942;
      --btn-hover: #454650;
      --popup-bg: #383942;
      --popup-text: #e2e2e8;
      --control-bg: #383942;
      --control-text: #e2e2e8;
    }
    html.dark {
      --bg: #161616;
      --bg-subtle: #1f1f1f;
      --bg-hover: #2a2a2a;
      --bg-active: #1e3a5f;
      --text: #e8e8e8;
      --text-muted: #999;
      --text-faint: #666;
      --border: #3a3a3a;
      --border-subtle: #2e2e2e;
      --input-bg: #262626;
      --btn-bg: #262626;
      --btn-hover: #333;
      --popup-bg: #262626;
      --popup-text: #e8e8e8;
      --control-bg: #262626;
      --control-text: #e8e8e8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, sans-serif; color: var(--text); background: var(--bg); }
    #app { display: flex; height: 100%; }
    #sidebar {
      width: 360px; min-width: 280px; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); background: var(--bg);
    }
    #sidebar header { padding: 12px; border-bottom: 1px solid var(--border-subtle); }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    #sidebar h1 { font-size: 1rem; }
    #theme-select {
      font-size: 12px; padding: 5px 8px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--btn-bg); color: var(--text);
      cursor: pointer;
    }
    .search-row { display: flex; gap: 6px; margin-bottom: 8px; }
    #search {
      flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px; background: var(--input-bg); color: var(--text);
    }
    #clear-filters {
      font-size: 12px; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--btn-bg); color: var(--text);
      cursor: pointer; white-space: nowrap;
    }
    #clear-filters:hover { background: var(--btn-hover); }
    #source-filters {
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-subtle);
    }
    #source-filters summary {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding: 10px 12px; cursor: pointer; user-select: none;
      list-style: none;
    }
    #source-filters summary::-webkit-details-marker { display: none; }
    #source-filters summary::before {
      content: "▸"; margin-right: 6px; font-size: 11px; color: var(--text-muted);
    }
    #source-filters[open] summary::before { content: "▾"; }
    .filter-summary-label {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .filter-summary-status {
      font-size: 12px; color: var(--text-muted); font-weight: 400;
      text-transform: none; letter-spacing: 0;
    }
    .filter-body { padding: 0 12px 10px 28px; }
    .filter-actions { margin-bottom: 8px; }
    .filter-actions button {
      font-size: 11px; padding: 3px 8px; margin-right: 6px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--btn-bg); color: var(--text); cursor: pointer;
    }
    .filter-actions button:hover { background: var(--btn-hover); }
    .filter-list { display: flex; flex-direction: column; gap: 2px; }
    .filter-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; padding: 3px 0; cursor: pointer; color: var(--text);
    }
    .filter-item input { cursor: pointer; flex-shrink: 0; }
    .filter-item span { line-height: 1.3; }
    .filter-count { color: var(--text-muted); }
    #place-list { flex: 1; overflow-y: auto; padding: 8px; }
    .group { margin-bottom: 12px; }
    .group.map-off .group-title { color: var(--text-muted); }
    .group.map-off .group-title::after {
      content: " · hidden on map"; font-weight: 400;
      color: var(--text-faint); font-size: 11px;
    }
    .group-title {
      font-weight: 600; font-size: 13px; color: var(--text);
      padding: 6px 4px; cursor: pointer; user-select: none;
    }
    .group-title::before { content: "▾ "; }
    .group.collapsed .group-title::before { content: "▸ "; }
    .group.collapsed .group-items { display: none; }
    .place {
      display: block; width: 100%; text-align: left;
      padding: 6px 8px; border: none; background: transparent;
      font-size: 13px; cursor: pointer; border-radius: 4px;
      color: var(--text);
    }
    .place.search-hidden { display: none; }
    .group.group-no-match { display: none; }
    .place:hover { background: var(--bg-hover); }
    .place.active { background: var(--bg-active); font-weight: 600; }
    .group-count { color: var(--text-muted); font-weight: 400; }
    #map { flex: 1; background: #ddd; }
  </style>
  <script>
    (function () {
      var theme = localStorage.getItem("theme");
      if (theme === "dim" || theme === "dark") document.documentElement.classList.add(theme);
    })();
  </script>

  <div id="app">
    <aside id="sidebar">
      <header>
        <div class="header-row">
          <h1>Japan Travel Plan</h1>
          <select id="theme-select" title="Sidebar UI theme">
            <option value="light">Light</option>
            <option value="dim">Dim</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="search-row">
          <input type="search" id="search" placeholder="Search places…">
          <button type="button" id="clear-filters">Clear</button>
        </div>
      </header>
      <details id="source-filters">
        <summary>
          <span class="filter-summary-label">Show on map</span>
          <span class="filter-summary-status" id="filter-summary"></span>
        </summary>
        <div class="filter-body">
          <div class="filter-actions">
            <button type="button" id="filter-all">All</button>
            <button type="button" id="filter-none">None</button>
          </div>
          <div class="filter-list" id="filter-list"></div>
        </div>
      </details>
      <div id="place-list"></div>
    </aside>
    <div id="map"></div>
  </div>

  <script>
    var map = L.map("map").setView([36.2, 138.25], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    function setTheme(theme) {
      if (theme !== "dim" && theme !== "dark") theme = "light";
      document.documentElement.classList.remove("dim", "dark");
      if (theme !== "light") document.documentElement.classList.add(theme);
      localStorage.setItem("theme", theme);
      $("#theme-select").val(theme);
    }

    setTheme(localStorage.getItem("theme") || "light");
    $("#theme-select").on("change", function () {
      setTheme(this.value);
    });

    var cluster = L.markerClusterGroup();
    map.addLayer(cluster);

    var markers = {};
    var markersByGroup = {};
    var placeGroup = {};
    var groupEnabled = {};
    var groupIds = {};
    var $active = null;

    function getSearchQuery() {
      return $("#search").val().toLowerCase().trim();
    }

    function placeMatchesQuery($el, q) {
      return $el.data("name").indexOf(q) >= 0 || $el.data("group").indexOf(q) >= 0;
    }

    function syncMapMarkers() {
      cluster.clearLayers();
      $.each(groupEnabled, function (gid, enabled) {
        if (!enabled || !markersByGroup[gid]) return;
        $.each(markersByGroup[gid], function (_, m) {
          cluster.addLayer(m);
        });
      });
    }

    function applySearchFilter() {
      var q = getSearchQuery();
      $(".place").each(function () {
        var $el = $(this);
        var gid = $el.closest(".group").data("gid");
        var hidden = q && (!groupEnabled[gid] || !placeMatchesQuery($el, q));
        $el.toggleClass("search-hidden", hidden);
      });
      $(".group").each(function () {
        var $g = $(this);
        var gid = $g.data("gid");
        if (!q) {
          $g.removeClass("group-no-match").addClass("collapsed");
          return;
        }
        if (!groupEnabled[gid]) {
          $g.addClass("group-no-match");
          return;
        }
        var matches = $g.find(".place:not(.search-hidden)").length;
        if (matches > 0) {
          $g.removeClass("group-no-match collapsed");
        } else {
          $g.addClass("group-no-match");
        }
      });
    }

    function updateFilterSummary() {
      var total = 0, active = 0;
      $.each(groupEnabled, function (_, enabled) {
        total++;
        if (enabled) active++;
      });
      var text = active + "/" + total + " sources";
      if (active === 0) text = "none selected";
      else if (active === total) text = "all " + total + " sources";
      $("#filter-summary").text(text);
    }

    function setGroupEnabled(gid, enabled) {
      groupEnabled[gid] = enabled;
      $("#filter-g" + gid).prop("checked", enabled);
      $(".group[data-gid='" + gid + "']").toggleClass("map-off", !enabled);
      updateFilterSummary();
      syncMapMarkers();
      applySearchFilter();
    }

    function showPlace(id) {
      var m = markers[id];
      if (!m) return;
      var gid = placeGroup[id];
      if (!groupEnabled[gid]) {
        setGroupEnabled(gid, true);
      }
      if ($active) $active.removeClass("active");
      $active = $("#place-" + id).addClass("active");
      $active.closest(".group").removeClass("collapsed");
      cluster.zoomToShowLayer(m, function () {
        m.openPopup();
      });
    }

    var $list = $("#place-list");
    var $filters = $("#filter-list");
    var data = window.PLACES_DATA;
    if (!data || !data.order) {
      $list.html("<p style='padding:12px;color:#c00'>Place data failed to load. Run <code>python3 app/build-places.py</code>.</p>");
    }

    var id = 0;
    $.each(data && data.order || [], function (gid, groupName) {
      var places = data.groups[groupName];
      groupIds[gid] = groupName;
      markersByGroup[gid] = [];
      groupEnabled[gid] = true;

      $("<label class='filter-item'>")
        .append(
          $("<input type='checkbox' checked>").attr("id", "filter-g" + gid).on("change", function () {
            setGroupEnabled(gid, this.checked);
          })
        )
        .append(
          $("<span>").html(
            $("<span>").text(groupName).html() +
            ' <span class="filter-count">(' + places.length + ")</span>"
          )
        )
        .appendTo($filters);

      var $group = $("<div class='group collapsed'>").attr("data-gid", gid).appendTo($list);
      $group.append(
        "<div class='group-title'>" + groupName +
        " <span class='group-count'>(" + places.length + ")</span></div>"
      );
      var $items = $("<div class='group-items'>").appendTo($group);

      $.each(places, function (_, p) {
        var pid = id++;
        var m = L.marker([p.lat, p.lng]).bindPopup(
          "<strong>" + $("<span>").text(p.name).html() + "</strong><br>" +
          "<small>" + groupName + "</small>"
        );
        m.on("click", function () { showPlace(pid); });
        markersByGroup[gid].push(m);
        markers[pid] = m;
        placeGroup[pid] = gid;

        $("<button class='place' id='place-" + pid + "'>")
          .text(p.name)
          .data("name", p.name.toLowerCase())
          .data("group", groupName.toLowerCase())
          .on("click", function () { showPlace(pid); })
          .appendTo($items);
      });
    });

    syncMapMarkers();
    updateFilterSummary();

    $("#filter-all").on("click", function () {
      $.each(groupEnabled, function (gid) {
        setGroupEnabled(gid, true);
      });
    });

    $("#filter-none").on("click", function () {
      $.each(groupEnabled, function (gid) {
        setGroupEnabled(gid, false);
      });
    });

    $list.on("click", ".group-title", function () {
      $(this).parent().toggleClass("collapsed");
    });

    $("#search").on("input", applySearchFilter);

    $("#clear-filters").on("click", function () {
      $("#search").val("");
      $.each(groupEnabled, function (gid) {
        groupEnabled[gid] = true;
        $("#filter-g" + gid).prop("checked", true);
        $(".group[data-gid='" + gid + "']").removeClass("map-off");
      });
      updateFilterSummary();
      syncMapMarkers();
      applySearchFilter();
    });
  </script>
</body>
</html>
